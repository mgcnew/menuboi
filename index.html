<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MenuBoard" />
    <meta name="application-name" content="Menu Board Digital" />
    <meta name="msapplication-TileColor" content="#0f172a" />
    <meta name="msapplication-tap-highlight" content="no" />
    
    <!-- TV/Display Specific -->
    <meta name="screen-orientation" content="landscape" />
    <meta name="full-screen" content="yes" />
    
    <title>Menu Board Digital - Painel de Controle</title>
    <meta name="description" content="Sistema de menu board digital para exibir imagens em carrossel em TVs e monitores. Gerencie suas promoções e cardápios digitais de forma simples." />
    <meta name="author" content="Menu Board Digital" />

    <!-- Favicon & Icons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="167x167" href="/icons/icon-152x152.png" />

    <!-- Open Graph -->
    <meta property="og:title" content="Menu Board Digital" />
    <meta property="og:description" content="Sistema de Menu Board Digital para TVs e Displays" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/icons/icon-512x512.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Menu Board Digital" />
    <meta name="twitter:description" content="Sistema de Menu Board Digital para TVs e Displays" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      // Detect Smart TV early so styles apply before React mounts (no cursor flash)
      (function () {
        try {
          var ua = navigator.userAgent || '';
          var params = new URLSearchParams(window.location.search);
          var isTV = params.get('tv') === '1' ||
            /SmartTV|SMART-TV|Tizen|WebOS|BRAVIA|AFT[A-Z]|GoogleTV|Android TV|HbbTV|NetCast|Viera|Roku|AppleTV/i.test(ua);
          if (isTV) document.body.classList.add('tv-mode');
        } catch (e) {}
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
